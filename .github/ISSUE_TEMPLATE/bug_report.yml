name: Bug report
description: Report a reproducible Adfinem problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest scenario, flow, or command that reproduces the issue. Do not include secrets.
      placeholder: |
        npm run adfinem -- validate scenarios/smoke/account-processing-smoke.yaml
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, database/API/batch adapter context, and relevant package version.
      placeholder: |
        node --version
        npm --version
        adfinem version:
    validations:
      required: false
